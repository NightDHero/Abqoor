app = "abqoor-admin-fly"
primary_region = "fra"

[env]
  ABQOOR_HOST = "0.0.0.0"
  ABQOOR_PORT = "8080"
  ABQOOR_STORAGE_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/"

[mounts]
  source = "abqoor_data"
  destination = "/data"